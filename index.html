<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NITRO CHAT // EPIC</title>
    <style>
        /* =========================================================
           NITRO CHAT – EPIC UI (responsive & clean)
        ========================================================= */
        :root {
            --bg-deep: #040410;
            --bg-panel: rgba(10, 10, 26, 0.85);
            --metal-dark: #12122a;
            --accent-cyan: #00e5ff;
            --accent-purple: #b347ea;
            --accent-gold: #f0a500;
            --glow-cyan: 0 0 14px rgba(0, 229, 255, 0.5);
            --glow-purple: 0 0 16px rgba(179, 71, 234, 0.5);
            --text-primary: #e0e0f4;
            --text-muted: #7a7a9a;
            --border-subtle: #1e1e3a;
            --border-glow: #3a3a60;
            --radius-md: 14px;
            --radius-lg: 18px;
            --font-main: 'Segoe UI', 'Inter', sans-serif;
            --sidebar-width: 280px;
            --header-height: 58px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            font-family: var(--font-main);
            background: var(--bg-deep);
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }
        #particleCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none; opacity: 0.7;
        }
        .app-shell {
            position: relative; z-index: 1; display: flex;
            width: 100vw; height: 100vh; background: transparent; overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-width); min-width: var(--sidebar-width);
            height: 100%; background: var(--bg-panel);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-subtle);
            display: flex; flex-direction: column; z-index: 10;
            box-shadow: 4px 0 40px rgba(0,0,0,0.5);
            transition: transform 0.35s;
        }
        .sidebar-header {
            padding: 16px 18px; border-bottom: 1px solid var(--border-subtle);
            display: flex; align-items: center; gap: 10px; flex-shrink: 0;
        }
        .sidebar-header .s-icon { font-size: 1.4rem; filter: drop-shadow(0 0 8px var(--accent-cyan)); }
        .sidebar-header .s-title {
            font-weight: 800; letter-spacing: 0.05em;
            background: linear-gradient(180deg, #f0f0ff 0%, #b0b0d8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 0.95rem; text-transform: uppercase;
        }
        .sidebar-section-label {
            font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em;
            color: #6a6a8a; padding: 12px 18px 6px; font-weight: 700;
        }
        .sidebar-users { flex: 1; overflow-y: auto; padding: 0 10px 10px; }
        .sidebar-users::-webkit-scrollbar { width: 4px; }
        .sidebar-users::-webkit-scrollbar-thumb { background: #2a2a45; border-radius: 10px; }
        .sidebar-user-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 12px;
            border-radius: var(--radius-md); cursor: pointer; transition: all 0.25s;
            margin-bottom: 2px; position: relative; border: 1px solid transparent;
        }
        .sidebar-user-item:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); }
        .sidebar-user-item .user-avatar {
            width: 34px; height: 34px; border-radius: 50%;
            background: linear-gradient(135deg, #3a3a60, #1e1e3a);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.8rem; color: #c8c8e8;
            flex-shrink: 0; border: 2px solid rgba(255,255,255,0.15);
            position: relative; overflow: hidden;
        }
        .sidebar-user-item .user-avatar img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
        }
        .online-indicator {
            position: absolute; bottom: 0px; right: 0px; width: 10px; height: 10px;
            border-radius: 50%; background: #4ade80; border: 2px solid #12122a;
            box-shadow: 0 0 8px rgba(74,222,128,0.7);
        }
        .sidebar-user-item .user-info { flex: 1; min-width: 0; }
        .sidebar-user-item .user-name { font-weight: 600; font-size: 0.82rem; color: #d8d8f0; }
        .sidebar-user-item .user-status-text { font-size: 0.68rem; color: #7a7a9a; }
        .sidebar-user-item .private-btn {
            background: rgba(240,165,0,0.15); border: 1px solid rgba(240,165,0,0.35);
            color: #f0c040; padding: 4px 10px; border-radius: 14px; font-size: 0.68rem;
            cursor: pointer; font-weight: 600; white-space: nowrap; transition: all 0.25s;
        }
        .private-btn:hover { background: rgba(240,165,0,0.3); box-shadow: var(--glow-gold); color: #fff; }
        .private-btn.pending { background: rgba(255,193,7,0.2); border-color: rgba(255,193,7,0.4); color: #ffc107; animation: pulse 1.5s infinite; }
        .private-btn.accepted { background: rgba(0,229,255,0.15); border-color: rgba(0,229,255,0.4); color: #00e5ff; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 4px rgba(255,193,7,0.3); } 50% { box-shadow: 0 0 16px rgba(255,193,7,0.7); } }
        .sidebar-user-item.you-tag .user-name::after { content: ' (you)'; color: #7a7a9a; font-weight: 400; font-size: 0.7rem; }
        .no-users-sidebar { text-align: center; color: #5a5a78; font-style: italic; padding: 20px; }
        .sidebar-footer {
            padding: 10px 14px; border-top: 1px solid var(--border-subtle); flex-shrink: 0;
            display: flex; align-items: center; gap: 8px; font-size: 0.72rem; color: #8a8aa8;
        }
        .sidebar-toggle {
            display: none; position: absolute; top: 12px; left: 12px; z-index: 30;
            background: var(--metal-dark); border: 1px solid var(--border-glow); color: #fff;
            width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 1.3rem;
            align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.6);
        }

        /* ── Chat Panel ── */
        .chat-panel {
            flex: 1; display: flex; flex-direction: column; height: 100%;
            background: var(--bg-panel); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); position: relative;
            overflow: hidden;
        }
        .chat-header-bar {
            height: var(--header-height); min-height: var(--header-height); padding: 0 12px;
            display: flex; align-items: center; justify-content: space-between; gap: 6px;
            border-bottom: 1px solid var(--border-subtle);
            background: rgba(15,15,35,0.7); backdrop-filter: blur(8px);
            flex-shrink: 0;
        }
        .chat-header-bar .header-left { display: flex; align-items: center; gap: 8px; }
        .chat-header-bar .header-icon { font-size: 1.4rem; filter: drop-shadow(0 0 10px var(--accent-cyan)); }
        .chat-header-bar .header-title {
            font-weight: 800; letter-spacing: 0.05em; font-size: 0.95rem;
            background: linear-gradient(180deg, #f0f0ff 0%, #b8b8d8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        .chat-header-bar .header-right { display: flex; align-items: center; gap: 4px; flex-wrap: nowrap; }
        .badge-pill {
            display: flex; align-items: center; gap: 3px; padding: 3px 8px; border-radius: 20px;
            font-size: 0.68rem; font-weight: 500; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.04); color: #c8c8e0; white-space: nowrap;
        }
        .badge-pill.connected-pill { border-color: rgba(74,222,128,0.4); color: #4ade80; }
        .badge-pill.disconnected-pill { border-color: rgba(255,64,96,0.5); color: #ff4060; }
        .btn-icon {
            width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2); color: #c0c0d8; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 0.85rem;
            flex-shrink: 0;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.4); color: #fff; }
        .error-toast {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(255,64,96,0.2); border: 1px solid rgba(255,64,96,0.5);
            color: #ff8098; padding: 10px 20px; border-radius: 20px; font-size: 0.78rem;
            z-index: 50; opacity: 0; transition: opacity 0.3s;
            backdrop-filter: blur(6px); pointer-events: none;
        }
        .error-toast.visible { opacity: 1; }

        /* ── Chat Tabs ── */
        .chat-tabs {
            display: flex; border-bottom: 1px solid var(--border-subtle);
            background: rgba(15,15,35,0.4); flex-shrink: 0;
        }
        .chat-tab {
            flex: 1; padding: 8px 10px; text-align: center; cursor: pointer;
            font-weight: 600; font-size: 0.75rem; color: var(--text-muted);
            border-bottom: 2px solid transparent; transition: all 0.25s;
            text-transform: uppercase;
        }
        .chat-tab.active {
            color: var(--accent-cyan); border-bottom-color: var(--accent-cyan);
            background: rgba(0,229,255,0.05);
        }

        /* ── Typing indicator ── */
        .typing-indicator {
            font-size: 2rem;
            color: var(--accent-cyan);
            padding: 2px 12px;
            font-style: italic;
            min-height: 28px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-shadow: 0 0 12px rgba(0,229,255,0.6);
            font-weight: 600;
            flex-shrink: 0;
        }
        .typing-dots {
            display: inline-flex; align-items: center;
        }
        .typing-dots span {
            width: 10px; height: 10px;
            background: var(--accent-cyan);
            border-radius: 50%; margin: 0 2px;
            animation: typingDot 1.2s infinite ease-in-out;
            box-shadow: 0 0 6px var(--accent-cyan);
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingDot {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-3px); }
        }

        /* ── Messages Container ── */
        .messages-container {
            flex: 1; overflow-y: auto; padding: 10px 14px; display: flex;
            flex-direction: column; gap: 8px; scroll-behavior: smooth;
        }
        .messages-container.hidden { display: none !important; }
        .messages-container::-webkit-scrollbar { width: 4px; }
        .messages-container::-webkit-scrollbar-thumb { background: #2a2a48; border-radius: 10px; }
        .empty-chat-hint { text-align: center; color: #5a5a7a; margin: auto; font-style: italic; }

        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }
        .msg-wrapper.own { align-self: flex-end; }
        .msg-bubble {
            padding: 10px 14px; border-radius: var(--radius-lg);
            background: var(--metal-dark); border: 1px solid var(--border-subtle);
            position: relative; word-break: break-word;
        }
        .msg-wrapper.own .msg-bubble {
            background: linear-gradient(135deg, #2d1b4e 0%, #1c1035 100%);
            border-color: #5a3a7a;
        }
        .msg-avatar {
            width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
            background: #3a3a60; display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; font-weight: 700; color: #c8c8e8; overflow: hidden;
        }
        .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .msg-username { font-weight: 700; font-size: 0.74rem; color: #c0a0f0; margin-bottom: 3px; display: flex; align-items: center; gap: 4px; }
        .msg-time { font-size: 0.6rem; color: #8a8aaa; margin-left: 4px; font-weight: 400; }
        .msg-text { font-size: 0.85rem; color: #d8d8f2; line-height: 1.3; }
        .msg-text.deleted { color: #5a5a78; font-style: italic; }
        .msg-edited { font-size: 0.6rem; color: #8a8aaa; margin-left: 4px; font-style: italic; }
        .msg-image-wrap { margin-top: 6px; border-radius: var(--radius-md); overflow: hidden; cursor: pointer; max-width: 280px; }
        .msg-image-wrap img { display: block; width: 100%; height: auto; max-height: 300px; object-fit: cover; }
        .reply-ref-block {
            background: rgba(0,229,255,0.05); border-left: 3px solid var(--accent-cyan);
            padding: 5px 7px; border-radius: 0 8px 8px 0; margin-bottom: 4px;
            cursor: pointer; display: flex; align-items: flex-start; gap: 6px;
            transition: background 0.2s;
        }
        .reply-ref-block:hover { background: rgba(0,229,255,0.1); }
        .reply-image-thumb { width: 45px; height: 45px; border-radius: 5px; object-fit: cover; flex-shrink: 0; }
        .reply-text-content { display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
        .reply-ref-block .r-user { font-weight: 600; color: var(--accent-cyan); font-size: 0.65rem; }
        .reply-ref-block .r-text {
            opacity: 0.8; overflow: hidden; text-overflow: ellipsis;
            white-space: nowrap; max-width: 180px; font-size: 0.65rem; color: #80d0e8;
        }

        .reactions-bar { display: flex; gap: 4px; margin-top: 4px; }
        .reaction-btn {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px; padding: 1px 6px; font-size: 0.65rem; cursor: pointer;
            display: flex; align-items: center; gap: 3px; color: #b0b0cc;
        }
        .reaction-btn.active { background: rgba(0,229,255,0.2); border-color: rgba(0,229,255,0.5); color: #fff; }

        /* ── Message actions container ── */
        .msg-actions-container {
            position: absolute; top: 4px; right: 8px;
            display: flex; gap: 3px; opacity: 0; transition: opacity 0.2s; pointer-events: none;
        }
        .msg-bubble:hover .msg-actions-container { opacity: 1; pointer-events: auto; }
        .msg-action-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
            color: #a0a0c0; border-radius: 4px; padding: 1px 5px; font-size: 0.55rem; cursor: pointer;
            white-space: nowrap;
        }
        .msg-action-btn:hover { background: rgba(0,229,255,0.2); border-color: rgba(0,229,255,0.5); color: #fff; }

        /* ── Input Area ── */
        .input-area-bar {
            padding: 8px 12px 10px; border-top: 1px solid var(--border-subtle);
            background: rgba(15,15,32,0.75); backdrop-filter: blur(10px);
            flex-shrink: 0; display: flex; flex-direction: column; gap: 6px;
        }
        .reply-indicator-bar, .private-indicator-bar {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 10px; border-radius: 8px; font-size: 0.7rem;
        }
        .reply-indicator-bar { background: rgba(0,229,255,0.07); border: 1px solid rgba(0,229,255,0.2); color: #90d8f0; }
        .private-indicator-bar { background: rgba(240,165,0,0.08); border: 1px solid rgba(240,165,0,0.25); color: #f0c860; }
        .cancel-btn { background: none; border: none; color: #ff7088; cursor: pointer; font-weight: 700; padding: 2px 4px; }
        .input-row-wrap { display: flex; gap: 6px; align-items: center; }
        #messageInput {
            flex: 1; padding: 9px 12px; border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md); font-size: 0.85rem; background: #0d0d20;
            color: #e0e0f2; outline: none; font-family: var(--font-main);
        }
        #messageInput:focus { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0,229,255,0.18); }
        .btn-upload-img {
            width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.18); color: #b0b0d0; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1rem;
            flex-shrink: 0;
        }
        .btn-upload-img.uploading { animation: spin 0.8s linear infinite; border-color: var(--accent-cyan); box-shadow: var(--glow-cyan); }
        @keyframes spin { to { transform: rotate(360deg); } }
        button.send-btn-main {
            background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
            color: #fff; border: none; padding: 9px 16px; border-radius: var(--radius-md);
            font-weight: 700; cursor: pointer; font-size: 0.8rem; text-transform: uppercase;
            box-shadow: 0 0 12px rgba(124,58,237,0.4); transition: all 0.3s;
            flex-shrink: 0;
        }
        button.send-btn-main:hover { box-shadow: 0 0 20px rgba(124,58,237,0.7), 0 0 35px rgba(0,229,255,0.25); }

        .image-preview-row {
            display: flex; align-items: center; gap: 6px;
            background: rgba(0,229,255,0.05); border: 1px solid rgba(0,229,255,0.15);
            border-radius: var(--radius-md); padding: 4px 8px;
        }
        .image-preview-thumb { width: 35px; height: 35px; object-fit: cover; border-radius: 5px; }
        .image-preview-remove { background: none; border: none; color: #ff7088; cursor: pointer; font-weight: 700; }

        /* ── Request overlay ── */
        .request-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); z-index: 400;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(12px);
        }
        .request-card {
            background: var(--metal-dark); padding: 30px 26px; border-radius: var(--radius-lg);
            width: 90%; max-width: 340px; text-align: center; border: 1px solid var(--border-glow);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), var(--glow-purple);
            animation: modalPop 0.4s ease-out;
        }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.8) translateY(20px); } }
        .request-avatar {
            width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 14px;
            background: #1e1e3a; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            border: 3px solid var(--accent-purple);
        }
        .request-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .request-name { font-size: 1.1rem; font-weight: 700; color: #d8d8f0; margin-bottom: 18px; }
        .request-buttons { display: flex; gap: 10px; justify-content: center; }
        .request-buttons button {
            padding: 9px 18px; border-radius: var(--radius-md); font-weight: 700;
            cursor: pointer; font-size: 0.85rem; border: none; transition: all 0.3s;
        }
        .btn-accept { background: var(--accent-cyan); color: #000; }
        .btn-accept:hover { box-shadow: var(--glow-cyan); }
        .btn-decline { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; }
        .btn-decline:hover { background: rgba(255,64,96,0.2); border-color: #ff4060; }

        /* Overlays */
        .overlay-full {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center; z-index: 300;
            backdrop-filter: blur(12px);
        }
        .overlay-card {
            background: var(--metal-dark); padding: 30px 26px; border-radius: var(--radius-lg);
            width: 90%; max-width: 380px; text-align: center; border: 1px solid var(--border-glow);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), var(--glow-purple);
        }
        .overlay-card h3 { margin-bottom: 18px; color: #d0b8f8; }
        .overlay-card input {
            width: 100%; padding: 12px; border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md); font-size: 0.95rem; margin-bottom: 12px;
            background: #0d0d20; color: #e0e0f2; outline: none; font-family: var(--font-main);
        }
        .overlay-card input:focus { border-color: var(--accent-purple); }
        .profile-pic-upload { display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 12px 0; }
        .profile-pic-preview {
            width: 70px; height: 70px; border-radius: 50%; background: #1e1e3a;
            border: 2px solid var(--accent-purple); cursor: pointer; overflow: hidden;
            display: flex; align-items: center; justify-content: center; color: #7a7a9a;
        }
        .profile-pic-preview img { width: 100%; height: 100%; object-fit: cover; }
        .profile-pic-preview:hover { border-color: var(--accent-cyan); }
        .overlay-card button {
            background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%); color: #fff;
            border: none; padding: 12px 0; width: 100%; border-radius: var(--radius-md);
            font-weight: 700; cursor: pointer; font-size: 0.95rem; text-transform: uppercase;
            margin-top: 8px;
            box-shadow: 0 0 16px rgba(124,58,237,0.4); transition: all 0.3s;
        }
        .overlay-card button:hover { box-shadow: 0 0 26px rgba(124,58,237,0.7), 0 0 40px rgba(0,229,255,0.2); }
        .hidden { display: none !important; }

        .lightbox-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 200; display: flex; align-items: center;
            justify-content: center; cursor: pointer;
        }
        .lightbox-overlay img { max-width: 90vw; max-height: 90vh; border-radius: var(--radius-lg); }

        /* ── Mobile tweaks ── */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed; top: 0; left: 0; height: 100%; z-index: 25;
                transform: translateX(-100%);
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-toggle {
                display: flex;
            }
            .chat-header-bar {
                padding-left: 52px;
            }
            .typing-indicator {
                font-size: 1.5rem;
            }
            .msg-wrapper { max-width: 90%; }
            #messageInput { font-size: 0.8rem; padding: 8px 10px; }
            button.send-btn-main { padding: 8px 12px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <!-- Name Overlay -->
    <div class="overlay-full" id="nameOverlay">
        <div class="overlay-card">
            <h3>⚡ CREATE YOUR IDENTITY</h3>
            <input type="text" id="nameInput" placeholder="Your signature..." maxlength="30" autocomplete="off">
            <div class="profile-pic-upload">
                <div class="profile-pic-preview" id="profilePicPreview" title="Click to upload picture">
                    <span style="font-size:2rem;">📷</span>
                </div>
                <input type="file" id="profilePicInput" accept="image/*" style="display:none;">
                <span style="font-size:0.7rem; color:#7a7a9a;">Profile picture (optional)</span>
            </div>
            <button id="nameSubmitBtn">JOIN THE SCENE</button>
        </div>
    </div>

    <!-- Edit Profile Overlay -->
    <div class="overlay-full hidden" id="editProfileOverlay">
        <div class="overlay-card">
            <h3>✎ EDIT YOUR PROFILE</h3>
            <input type="text" id="editNameInput" placeholder="Your new signature..." maxlength="30" autocomplete="off">
            <div class="profile-pic-upload">
                <div class="profile-pic-preview" id="editProfilePicPreview" title="Click to upload new picture">
                    <span style="font-size:2rem;">📷</span>
                </div>
                <input type="file" id="editProfilePicInput" accept="image/*" style="display:none;">
                <span style="font-size:0.7rem; color:#7a7a9a;">New profile picture (optional)</span>
            </div>
            <button id="editProfileSaveBtn">SAVE CHANGES</button>
            <button style="background:rgba(255,255,255,0.1); margin-top:8px;" id="editProfileCancelBtn">Cancel</button>
        </div>
    </div>

    <!-- Request Overlay -->
    <div class="request-overlay hidden" id="requestOverlay">
        <div class="request-card">
            <div class="request-avatar" id="requestAvatar"></div>
            <div class="request-name" id="requestName"></div>
            <div class="request-buttons">
                <button class="btn-accept" id="requestAcceptBtn">✅ Accept</button>
                <button class="btn-decline" id="requestDeclineBtn">❌ Decline</button>
            </div>
        </div>
    </div>

    <button class="sidebar-toggle" id="sidebarToggle" title="Users">☰</button>

    <div class="app-shell" id="appShell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="s-icon">⚡</span>
                <span class="s-title">Online Scene</span>
            </div>
            <div class="sidebar-section-label">🔵 Active Users</div>
            <div class="sidebar-users" id="sidebarUsers">
                <div class="no-users-sidebar">No one else online</div>
            </div>
            <div class="sidebar-footer">
                <span id="sidebarStatusDot" style="width:7px;height:7px;border-radius:50%;background:#4ade80;"></span>
                <span id="sidebarStatusText">Connected</span>
            </div>
        </aside>

        <main class="chat-panel" id="chatPanel">
            <div class="chat-header-bar">
                <div class="header-left">
                    <span class="header-icon">⚡</span>
                    <span class="header-title">NITRO CHAT</span>
                </div>
                <div class="header-right">
                    <span class="badge-pill" id="connectionPill">
                        <span id="connDot" style="width:6px;height:6px;border-radius:50%;background:#4ade80;"></span>
                        <span id="connText">Live</span>
                    </span>
                    <span class="badge-pill" id="onlineCountBadge">
                        <span style="color:#4ade80;">●</span> <span id="onlineCountNumber">0</span>
                    </span>
                    <button class="btn-icon" id="refreshBtn" title="Reconnect">↻</button>
                    <span class="badge-pill" id="userPill" style="display:none;">
                        <span id="headerAvatar" style="width:18px;height:18px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;"></span>
                        <span id="displayNamePill"></span>
                        <span style="cursor:pointer; margin-left:2px;" id="changeNameBtn" title="Edit profile">✎</span>
                    </span>
                </div>
            </div>
            <div class="chat-tabs" id="chatTabs">
                <div class="chat-tab active" data-tab="public">🌐 Public</div>
                <div class="chat-tab" data-tab="private">🔒 Private</div>
            </div>
            <div class="error-toast" id="errorToast"></div>
            <div class="typing-indicator" id="typingIndicator"></div>
            <div class="messages-container" id="publicMessagesContainer">
                <div class="empty-chat-hint">No messages yet. ⚡</div>
            </div>
            <div class="messages-container hidden" id="privateMessagesContainer">
                <div class="empty-chat-hint">No private messages.</div>
            </div>
            <button class="btn-icon" id="scrollBottomBtn" title="Scroll to bottom" style="position:absolute;bottom:80px;right:20px;display:none;z-index:20;">↓</button>
            <div class="input-area-bar" id="inputAreaBar" style="display:none;">
                <div class="reply-indicator-bar hidden" id="replyIndicatorBar">
                    <span>↳ Replying to <strong id="replyToUserDisp"></strong></span>
                    <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:0.8;" id="replyPreviewDisp"></span>

                <div class="private-indicator-bar hidden" id="privateIndicatorBar">

                    <button class="cancel-btn" id="cancelPrivateBtn" style="color:#f0a500;">✕ End</button>
                </div>
                <div class="image-preview-row hidden" id="imagePreviewRow">
                    <img class="image-preview-thumb" id="imagePreviewThumb" src="">
                    <span class="image-preview-name" id="imagePreviewName" style="flex:1;font-size:0.7rem;"></span>
                    <button class="image-preview-remove" id="imagePreviewRemove">✕</button>
                </div>
                <div class="input-row-wrap">
                    <input type="text" id="messageInput" placeholder="Type a message..." maxlength="500">
                    <button class="btn-upload-img" id="uploadImgBtn" title="Attach image (max 750px)">🖼</button>
                    <input type="file" id="fileInput" accept="image/*" style="display:none;">
                    <button class="send-btn-main" id="sendBtn">SEND</button>

        <img id="lightboxImg" src="">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            const SUPABASE_URL = 'https://uxrpjfsouwxnlcbhjilz.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_cLeBoHrdvg1b7WlnyJ-oVQ_6skjHc_H';
            const STORAGE_BUCKET = 'chat-images';
            const AVATAR_BUCKET = 'chat-avatars';

            // State
            let username = localStorage.getItem('nitro_chat_username') || '';
            let clientId = localStorage.getItem('nitro_chat_client_id') || '';
            if (!clientId) {
                clientId = 'c_' + Math.random().toString(36).substr(2,9) + '_' + Date.now().toString(36);

            }
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            let avatarCache = {};
            let activePrivateChat = null;
            let currentTab = 'public';
            let onlineUsers = new Map();
            let pendingPrivateRequests = new Map();
            let acceptedPrivateChats = new Set(JSON.parse(localStorage.getItem('nitro_accepted_chats') || '[]'));
            let knownMessageIds = new Set();
            let replyingTo = null;
            let pendingImageUrl = null;
            let profilePicFile = null;
            let editProfilePicFile = null;
            let realtimeChannel, presenceChannel, privateRequestsChannel, privMsgChannel, reactionsChannel, privReactionsChannel, profilesChannel;
            let messageReactions = {};
            let privateMessageReactions = {};
            const EMOJIS = ['❤️','😂','😮','😢','😡'];

            // Typing broadcast state
            const typingUsers = new Map(); // key: username, value: { tab, partner, timeoutId }
            let typingChannel = null;

            const publicContainer = document.getElementById('publicMessagesContainer');
            const privateContainer = document.getElementById('privateMessagesContainer');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const errorToast = document.getElementById('errorToast');
            const inputAreaBar = document.getElementById('inputAreaBar');
            const userPill = document.getElementById('userPill');
            const displayNamePill = document.getElementById('displayNamePill');
            const headerAvatar = document.getElementById('headerAvatar');
            const nameOverlay = document.getElementById('nameOverlay');
            const nameInput = document.getElementById('nameInput');
            const nameSubmitBtn = document.getElementById('nameSubmitBtn');
            const profilePicPreview = document.getElementById('profilePicPreview');
            const profilePicInput = document.getElementById('profilePicInput');
            const refreshBtn = document.getElementById('refreshBtn');
            const connDot = document.getElementById('connDot');
            const connText = document.getElementById('connText');
            const connectionPill = document.getElementById('connectionPill');
            const sidebarUsers = document.getElementById('sidebarUsers');
            const onlineCountNumber = document.getElementById('onlineCountNumber');
            const chatTabs = document.getElementById('chatTabs');
            const scrollBottomBtn = document.getElementById('scrollBottomBtn');
            const replyIndicatorBar = document.getElementById('replyIndicatorBar');
            const replyToUserDisp = document.getElementById('replyToUserDisp');
            const replyPreviewDisp = document.getElementById('replyPreviewDisp');
            const cancelReplyBtn = document.getElementById('cancelReplyBtn');
            const privateIndicatorBar = document.getElementById('privateIndicatorBar');
            const privateChatUserDisp = document.getElementById('privateChatUserDisp');
            const cancelPrivateBtn = document.getElementById('cancelPrivateBtn');
            const uploadImgBtn = document.getElementById('uploadImgBtn');
            const fileInput = document.getElementById('fileInput');
            const imagePreviewRow = document.getElementById('imagePreviewRow');
            const imagePreviewThumb = document.getElementById('imagePreviewThumb');
            const imagePreviewRemove = document.getElementById('imagePreviewRemove');
            const lightboxOverlay = document.getElementById('lightboxOverlay');
            const lightboxImg = document.getElementById('lightboxImg');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const changeNameBtn = document.getElementById('changeNameBtn');
            const typingIndicator = document.getElementById('typingIndicator');
            const requestOverlay = document.getElementById('requestOverlay');
            const requestAvatar = document.getElementById('requestAvatar');
            const requestName = document.getElementById('requestName');
            const requestAcceptBtn = document.getElementById('requestAcceptBtn');
            const requestDeclineBtn = document.getElementById('requestDeclineBtn');
            let currentRequestData = null;
            const editProfileOverlay = document.getElementById('editProfileOverlay');
            const editNameInput = document.getElementById('editNameInput');
            const editProfilePicPreview = document.getElementById('editProfilePicPreview');
            const editProfilePicInput = document.getElementById('editProfilePicInput');
            const editProfileSaveBtn = document.getElementById('editProfileSaveBtn');
            const editProfileCancelBtn = document.getElementById('editProfileCancelBtn');

            // Particles (unchanged)
            const particleCanvas = document.getElementById('particleCanvas');
            const pCtx = particleCanvas.getContext('2d');
            let particles = [];
            function resizeCanvas() { particleCanvas.width = window.innerWidth; particleCanvas.height = window.innerHeight; }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * particleCanvas.width;
                    this.y = Math.random() * particleCanvas.height;
                    this.size = Math.random() * 1.5 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.speedY = (Math.random() - 0.5) * 0.4;
                    this.opacity = Math.random() * 0.5 + 0.15;
                    this.pulseSpeed = Math.random() * 0.02 + 0.005;
                    this.pulseOffset = Math.random() * Math.PI * 2;
                }
                update(time) {
                    this.x += this.speedX; this.y += this.speedY;
                    if(this.x < -10) this.x = particleCanvas.width + 10;
                    if(this.x > particleCanvas.width + 10) this.x = -10;
                    if(this.y < -10) this.y = particleCanvas.height + 10;
                    if(this.y > particleCanvas.height + 10) this.y = -10;
                    this.currentOpacity = this.opacity + Math.sin(time * this.pulseSpeed + this.pulseOffset) * 0.2;
                    this.currentOpacity = Math.max(0.05, Math.min(0.8, this.currentOpacity));
                }
                draw(ctx) {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(180,200,255,${this.currentOpacity})`; ctx.fill();
                    if(this.size > 1.2) {
                        ctx.beginPath(); ctx.arc(this.x, this.y, this.size*2.5, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(140,180,255,${this.currentOpacity*0.25})`; ctx.fill();
                    }
                }
            }
            for(let i=0; i<80; i++) particles.push(new Particle());
            function animateParticles(ts) {
                pCtx.clearRect(0,0,particleCanvas.width,particleCanvas.height);
                particles.forEach(p => { p.update(ts); p.draw(pCtx); });
                for(let i=0; i<particles.length; i++) {
                    for(let j=i+1; j<particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx*dx+dy*dy);
                        if(dist < 100) {
                            const alpha = (1 - dist/100)*0.12;
                            pCtx.beginPath(); pCtx.moveTo(particles[i].x,particles[i].y); pCtx.lineTo(particles[j].x,particles[j].y);
                            pCtx.strokeStyle = `rgba(160,200,240,${alpha})`; pCtx.lineWidth = 0.5; pCtx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animateParticles);
            }
            requestAnimationFrame(animateParticles);

            function escapeHtml(t) { const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g, m=>map[m]); }
            function trunc(t, l=45) { return t && t.length>l ? t.substring(0,l)+'…' : t||''; }
            function showError(msg) {
                errorToast.textContent = '⚠️ ' + msg; errorToast.classList.add('visible');
                clearTimeout(errorToast._timeout);
                errorToast._timeout = setTimeout(() => errorToast.classList.remove('visible'), 5000);
            }
            function setConnection(state) {
                const dot = document.getElementById('connDot');
                const text = document.getElementById('connText');
                const pill = document.getElementById('connectionPill');
                if(state === 'connected') {
                    dot.style.background = '#4ade80'; text.textContent = 'Live'; pill.className = 'badge-pill connected-pill';
                    document.getElementById('sidebarStatusDot').style.background = '#4ade80'; document.getElementById('sidebarStatusText').textContent = 'Connected';
                } else {
                    dot.style.background = '#ffc107'; text.textContent = 'Connecting…'; pill.className = 'badge-pill';
                    document.getElementById('sidebarStatusDot').style.background = '#ffc107'; document.getElementById('sidebarStatusText').textContent = 'Connecting…';
                }
            }
            function formatTime(iso) {
                if (!iso) return '';
                return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }

            async function fetchAvatars(usernames) {
                const unique = [...new Set(usernames.filter(u => u && !avatarCache[u]))];
                if (!unique.length) return;
                const { data, error } = await supabase.from('profiles').select('username,avatar_url').in('username', unique);
                if (error) return console.warn('Error fetching avatars:', error);
                (data||[]).forEach(p => { avatarCache[p.username] = p.avatar_url; });
            }
            function avatarHTML(user) {
                const url = avatarCache[user];
                return url ? `<img src="${escapeHtml(url)}" style="width:100%;height:100%;object-fit:cover;">` : (user||'?')[0].toUpperCase();
            }

            function resizeImage(file, maxDim=750) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => {
                        let {width, height} = img;
                        if(width <= maxDim && height <= maxDim) return resolve(file);
                        const ratio = Math.min(maxDim/width, maxDim/height);
                        const canvas = document.createElement('canvas');
                        canvas.width = Math.round(width*ratio);
                        canvas.height = Math.round(height*ratio);
                        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
                        canvas.toBlob(blob => resolve(new File([blob], file.name.replace(/\.[^.]+$/,'.jpg'), {type:'image/jpeg'})), 'image/jpeg', 0.85);
                    };
                    img.onerror = reject;
                    img.src = URL.createObjectURL(file);
                });
            }
            async function uploadToStorage(file, bucket, maxDim=750) {
                const resized = await resizeImage(file, maxDim);
                const filename = `public/${Date.now()}_${Math.random().toString(36).substr(2,6)}.jpg`;
                const { data, error } = await supabase.storage.from(bucket).upload(filename, resized, { cacheControl:'3600', upsert:false, contentType:'image/jpeg' });
                if (error) throw error;
                const { data: { publicUrl } } = supabase.storage.from(bucket).getPublicUrl(filename);
                return publicUrl;
            }
            async function attachChatImage(file) {
                uploadImgBtn.classList.add('uploading');
                try {
                    const url = await uploadToStorage(file, STORAGE_BUCKET);
                    pendingImageUrl = url;
                    imagePreviewThumb.src = url;
                    imagePreviewRow.classList.remove('hidden');
                } catch (err) { showError('Image upload failed: ' + err.message); }
                finally { uploadImgBtn.classList.remove('uploading'); }
            }
            function clearAttachedImage() {
                pendingImageUrl = null;
                imagePreviewRow.classList.add('hidden');
                fileInput.value = '';
            }

            async function loadReactions(table, isPrivate) {
                const { data, error } = await supabase.from(table).select('*');
                if (error) return;
                const target = isPrivate ? privateMessageReactions : messageReactions;
                Object.keys(target).forEach(k => delete target[k]);
                (data||[]).forEach(r => {
                    if (!target[r.message_id]) target[r.message_id] = {};
                    if (!target[r.message_id][r.emoji]) target[r.message_id][r.emoji] = { count:0, users: new Set() };
                    target[r.message_id][r.emoji].count++;
                    target[r.message_id][r.emoji].users.add(r.username);
                });
                document.querySelectorAll('.msg-wrapper').forEach(w => updateReactionUI(w, isPrivate));
            }
            function subscribeReactions() {
                if (reactionsChannel) supabase.removeChannel(reactionsChannel);
                reactionsChannel = supabase.channel('pub-react').on('postgres_changes', { event:'*', schema:'public', table:'message_reactions' }, () => loadReactions('message_reactions', false)).subscribe();
                if (privReactionsChannel) supabase.removeChannel(privReactionsChannel);
                privReactionsChannel = supabase.channel('priv-react').on('postgres_changes', { event:'*', schema:'public', table:'private_message_reactions' }, () => loadReactions('private_message_reactions', true)).subscribe();
            }
            function updateReactionUI(wrapper, isPrivate) {
                const mid = wrapper.getAttribute('data-msg-id');
                const bar = wrapper.querySelector('.reactions-bar');
                if (!bar) return;
                const reactions = (isPrivate ? privateMessageReactions : messageReactions)[mid] || {};
                bar.innerHTML = EMOJIS.map(emoji => {
                    const d = reactions[emoji] || { count:0, users: new Set() };
                    return `<button class="reaction-btn ${d.users.has(username)?'active':''}" data-emoji="${emoji}">${emoji} ${d.count}</button>`;
                }).join('');
                bar.querySelectorAll('.reaction-btn').forEach(b => b.addEventListener('click', e => {
                    e.stopPropagation();
                    toggleReaction(mid, b.dataset.emoji, isPrivate);
                }));
            }
            async function toggleReaction(messageId, emoji, isPrivate) {
                const table = isPrivate ? 'private_message_reactions' : 'message_reactions';
                const { data: existing } = await supabase.from(table).select('id').match({ message_id: messageId, username, emoji }).single();
                if (existing) await supabase.from(table).delete().eq('id', existing.id);
                else await supabase.from(table).insert({ message_id: messageId, username, emoji });
            }

            function insertMessageChronologically(container, wrapper, msg) {
                const timestamp = msg.created_at;
                const children = container.querySelectorAll('.msg-wrapper');
                let inserted = false;
                for (let i = 0; i < children.length; i++) {
                    const child = children[i];
                    const childTimestamp = child.getAttribute('data-created-at');
                    if (childTimestamp && childTimestamp > timestamp) {
                        container.insertBefore(wrapper, child);
                        inserted = true;
                        break;
                    }
                }
                if (!inserted) container.appendChild(wrapper);
            }

            async function renderMessage(msg, isPrivate = false) {
                if (knownMessageIds.has(msg.id)) return;
                knownMessageIds.add(msg.id);
                const container = isPrivate ? privateContainer : publicContainer;
                const hint = container.querySelector('.empty-chat-hint');
                if (hint) hint.style.display = 'none';
                const user = isPrivate ? msg.from_user : msg.username;
                if (!avatarCache[user]) await fetchAvatars([user]);
                const isOwn = user === username;
                const wrapper = document.createElement('div');
                wrapper.className = 'msg-wrapper' + (isOwn ? ' own' : '');
                wrapper.setAttribute('data-msg-id', msg.id);
                wrapper.setAttribute('data-created-at', msg.created_at);
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                if (isPrivate) bubble.classList.add('private-msg');
                let html = '';
                if (msg.reply_to_username && msg.reply_to_message) {
                    let titleText = msg.reply_to_username + ': ' + (msg.reply_to_message || '');
                    if (msg.reply_to_image_url) titleText = '[Image] ' + titleText;
                    html += `<div class="reply-ref-block" data-reply-to-id="${msg.reply_to_id||''}" title="${escapeHtml(titleText)}">`;
                    if (msg.reply_to_image_url) html += `<img src="${escapeHtml(msg.reply_to_image_url)}" class="reply-image-thumb">`;
                    html += `<div class="reply-text-content"><span class="r-user">↳ ${escapeHtml(msg.reply_to_username)}</span><span class="r-text">"${escapeHtml(trunc(msg.reply_to_message,55))}"</span></div></div>`;
                }
                html += `<div class="msg-username"><span class="msg-avatar">${avatarHTML(user)}</span> ${escapeHtml(user)}${isPrivate?' <span style="font-size:0.6rem;opacity:0.6;">🔒</span>':''} <span class="msg-time">${formatTime(msg.created_at)}</span>`;
                if (msg.edited_at) html += `<span class="msg-edited">(edited)</span>`;
                html += `</div>`;
                if (msg.is_deleted) {
                    html += `<div class="msg-text deleted">Message removed</div>`;
                } else {
                    if (msg.message) html += `<div class="msg-text">${escapeHtml(msg.message)}</div>`;
                }
                if (msg.image_url && !msg.is_deleted) {
                    html += `<div class="msg-image-wrap" data-img-src="${escapeHtml(msg.image_url)}"><img src="${escapeHtml(msg.image_url)}"></div>`;
                }
                html += `<div class="msg-actions-container">`;
                html += `<button class="msg-action-btn reply-btn" data-id="${msg.id}" data-username="${escapeHtml(user)}" data-message="${escapeHtml(msg.message||'')}" data-imageurl="${msg.image_url||''}">↩ Reply</button>`;
                if (isOwn && !msg.is_deleted) {
                    html += `<button class="msg-action-btn edit-btn" data-id="${msg.id}">✎</button>`;
                    html += `<button class="msg-action-btn delete-btn" data-id="${msg.id}">✕</button>`;
                }
                html += `</div>`;
                html += `<div class="reactions-bar"></div>`;
                bubble.innerHTML = html;
                wrapper.appendChild(bubble);
                insertMessageChronologically(container, wrapper, msg);
                container.scrollTop = container.scrollHeight;

                const replyBtn = bubble.querySelector('.reply-btn');
                if (replyBtn) {
                    replyBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const btn = e.currentTarget;
                        setReplyingTo({ id: btn.dataset.id, username: btn.dataset.username, message: btn.dataset.message, imageUrl: btn.dataset.imageurl || null });
                    });
                }
                const imgWrap = bubble.querySelector('.msg-image-wrap');
                if (imgWrap) {
                    imgWrap.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const src = imgWrap.dataset.imgSrc;
                        if (src) { lightboxImg.src = src; lightboxOverlay.classList.remove('hidden'); }
                    });
                }
                const ref = bubble.querySelector('.reply-ref-block');
                if (ref && msg.reply_to_id) {
                    ref.addEventListener('click', () => {
                        const target = (isPrivate?privateContainer:publicContainer).querySelector(`[data-msg-id="${msg.reply_to_id}"]`);
                        if (target) { target.scrollIntoView({ behavior:'smooth', block:'center' }); target.classList.add('highlight-flash'); setTimeout(() => target.classList.remove('highlight-flash'), 800); }
                    });
                }
                if (isOwn && !msg.is_deleted) {
                    const editBtn = bubble.querySelector('.edit-btn');
                    const deleteBtn = bubble.querySelector('.delete-btn');
                    if (editBtn) {
                        editBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            startEditMessage(msg, isPrivate);
                        });

                    if (deleteBtn) {
                        deleteBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            deleteMessage(msg, isPrivate);
                        });
                    }
                }
                updateReactionUI(wrapper, isPrivate);

                textDiv.innerHTML = `<input type="text" class="edit-input" value="${escapeHtml(currentText)}" id="editInput-${msg.id}" style="width:100%; background:#0d0d20; border:1px solid var(--accent-cyan); color:#e0e0f2; padding:4px 8px; border-radius:6px; font-size:0.85rem;">
                    <div style="display:flex; gap:4px; margin-top:4px;">

                    </div>`;

                const cancelBtn = bubble.querySelector('.cancel-edit');

                    const table = isPrivate ? 'private_messages' : 'messages';
                    const { error } = await supabase.from(table).update({ message: newText, edited_at: new Date().toISOString() }).eq('id', msg.id);

                    msg.message = newText;
                    msg.edited_at = new Date().toISOString();

                    const imgWrap = bubble.querySelector('.msg-image-wrap');
                    if (imgWrap) imgWrap.style.display = 'none';

                const bubble = wrapper.querySelector('.msg-bubble');

                        if (!editedSpan) {

                    if (imgWrap) imgWrap.style.display = 'none';

            // ── TYPING via Broadcast Channel ──
            function startTyping() {
                if (!username || !typingChannel) return;
                const tab = currentTab === 'private' && activePrivateChat ? 'private' : 'public';
                const partner = tab === 'private' ? activePrivateChat : null;
                typingChannel.send({
                    type: 'broadcast',
                    event: 'typing',
                    payload: { username, tab, partner }
                }).then(() => {}).catch(console.warn);
            }

            function stopTyping() {
                if (!username || !typingChannel) return;
                typingChannel.send({
                    type: 'broadcast',
                    event: 'stop_typing',
                    payload: { username }
                }).then(() => {}).catch(console.warn);
            }

            messageInput.addEventListener('input', () => {
                if (messageInput.value.length > 0) {
                    startTyping();
                } else {
                    stopTyping();
                }
            });

            // Handle incoming typing broadcasts
            function handleTypingBroadcast(payload) {
                const { event, username: sender, tab, partner } = payload;
                if (sender === username) return;

                if (event === 'typing') {
                    // Clear previous timeout for this user
                    if (typingUsers.has(sender)) {
                        clearTimeout(typingUsers.get(sender).timeoutId);
                    }
                    // Set a new timeout to remove the typing indicator after 3 seconds if no new updates
                    const timeoutId = setTimeout(() => {
                        typingUsers.delete(sender);
                        updateTypingIndicator();
                    }, 3000);
                    typingUsers.set(sender, { tab, partner, timeoutId });
                } else if (event === 'stop_typing') {
                    if (typingUsers.has(sender)) {
                        clearTimeout(typingUsers.get(sender).timeoutId);
                        typingUsers.delete(sender);
                    }
                }
                updateTypingIndicator();
            }

            function updateTypingIndicator() {
                const typersPublic = [];
                const typersPrivate = {};
                typingUsers.forEach((data, user) => {
                    if (data.tab === 'public') {
                        typersPublic.push(user);
                    } else if (data.tab === 'private' && data.partner === username) {
                        typersPrivate[user] = true;
                    }
                });

                let text = '';
                const dots = '<span class="typing-dots"><span></span><span></span><span></span></span>';

                if (currentTab === 'public') {
                    if (typersPublic.length === 1) text = `${typersPublic[0]} is typing... ${dots}`;
                    else if (typersPublic.length > 1) text = `Several people are typing... ${dots}`;
                } else if (currentTab === 'private' && activePrivateChat) {
                    if (typersPrivate[activePrivateChat]) text = `${activePrivateChat} is typing... ${dots}`;
                }

                typingIndicator.innerHTML = text || '';
            }

            function setupTypingChannel() {
                if (typingChannel) supabase.removeChannel(typingChannel);
                typingChannel = supabase.channel('typing-broadcast', {
                    config: { broadcast: { self: false } }
                });
                typingChannel.on('broadcast', { event: 'typing' }, (payload) => {
                    handleTypingBroadcast(payload.payload);
                });
                typingChannel.on('broadcast', { event: 'stop_typing' }, (payload) => {
                    handleTypingBroadcast(payload.payload);
                });
                typingChannel.subscribe();
            }

            // ── Presence (unchanged) ──
            function setupPresence() {
                if (presenceChannel) return;
                if (!username) return;
                const key = `${username}::${clientId}`;
                presenceChannel = supabase.channel('presence', { config: { presence: { key } } });
                presenceChannel.on('presence', { event:'sync' }, () => {
                    const state = presenceChannel.presenceState();
                    onlineUsers.clear();
                    Object.keys(state).forEach(k => {
                        const p = state[k][0];
                        if (p) onlineUsers.set(k, { username: p.username });
                    });
                    updateSidebar();
                    setConnection('connected');
                });
                presenceChannel.on('presence', { event:'join' }, ({ key, newPresences }) => {
                    const p = newPresences[0];
                    if (p) onlineUsers.set(key, { username: p.username });
                    updateSidebar();
                });
                presenceChannel.on('presence', { event:'leave' }, ({ key }) => {
                    onlineUsers.delete(key);
                    updateSidebar();
                });
                presenceChannel.subscribe(async status => {
                    if (status === 'SUBSCRIBED') await presenceChannel.track({ username, client_id: clientId, online_at: new Date().toISOString() });
                });
            }

            function reTrackPresence() {
                if (username && presenceChannel) {
                    presenceChannel.track({ username, client_id: clientId, online_at: new Date().toISOString() }).catch(console.warn);
                }
            }

            function switchTab(tab) {
                currentTab = tab;
                chatTabs.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
                const active = chatTabs.querySelector(`[data-tab="${tab}"]`);
                if (active) active.classList.add('active');
                publicContainer.classList.toggle('hidden', tab !== 'public');
                privateContainer.classList.toggle('hidden', tab !== 'private');
                if (tab === 'private' && activePrivateChat) {
                    privateIndicatorBar.classList.remove('hidden');
                    privateChatUserDisp.textContent = activePrivateChat;
                    messageInput.placeholder = `Private message to ${activePrivateChat}...`;
                } else {
                    privateIndicatorBar.classList.add('hidden');
                    messageInput.placeholder = 'Type a message...';
                }
                updateTypingIndicator();
                // Re-send typing status if input not empty
                if (messageInput.value.length > 0) startTyping();
            }
            chatTabs.addEventListener('click', e => {
                const tab = e.target.closest('.chat-tab');
                if (!tab) return;
                const name = tab.dataset.tab;
                if (name === 'private' && !activePrivateChat) return showError('Select a private partner first.');
                switchTab(name);

            function setActivePrivateChat(partner) {

                    privateChatUserDisp.textContent = partner;
                    messageInput.placeholder = `Private message to ${partner}...`;
                    if (currentTab !== 'private') switchTab('private');
                    loadPrivateMessages(partner);
                } else {
                    activePrivateChat = null;
                    privateIndicatorBar.classList.add('hidden');
                    if (currentTab === 'private') switchTab('public');
                }
                updateSidebar();
                updateTypingIndicator();
            }
            cancelPrivateBtn.addEventListener('click', () => setActivePrivateChat(null));

            async function loadPrivateMessages(partner) {
                privateContainer.innerHTML = '<div class="empty-chat-hint">Loading…</div>';
                const { data, error } = await supabase
                    .from('private_messages')
                    .select('*')
                    .or(`and(from_user.eq.${username},to_user.eq.${partner}),and(from_user.eq.${partner},to_user.eq.${username})`)
                    .order('created_at', { ascending: true });
                if (error) { showError('Failed to load'); return; }
                privateContainer.innerHTML = '';
                if (data.length === 0) {
                    privateContainer.innerHTML = '<div class="empty-chat-hint">No private messages.</div>';
                } else {
                    const users = [...new Set(data.flatMap(m => [m.from_user, m.to_user]))];
                    await fetchAvatars(users);
                    data.forEach(m => renderMessage(m, true));
                }
                loadReactions('private_message_reactions', true);
            }

            async function updateSidebar() {
                const usersToFetch = [];
                if (username) usersToFetch.push(username);
                onlineUsers.forEach(u => usersToFetch.push(u.username));
                await fetchAvatars(usersToFetch);
                let html = '';
                if (username) html += buildSidebarItem(username, true, false, true, false);
                onlineUsers.forEach(user => {
                    if (user.username !== username) {
                        const pending = pendingPrivateRequests.has(user.username) && pendingPrivateRequests.get(user.username).status === 'pending' && pendingPrivateRequests.get(user.username).from_user === user.username;
                        const isAccepted = acceptedPrivateChats.has(user.username);
                        html += buildSidebarItem(user.username, true, pending, false, isAccepted);
                    }
                });
                sidebarUsers.innerHTML = html || '<div class="no-users-sidebar">No one else online</div>';
                onlineCountNumber.textContent = onlineUsers.size;
                sidebarUsers.querySelectorAll('.sidebar-user-item').forEach(item => {
                    const name = item.dataset.username;
                    if (name !== username) {
                        item.querySelector('.private-btn')?.addEventListener('click', e => { e.stopPropagation(); handlePrivateChatClick(name); });
                        item.addEventListener('click', () => {
                            if (activePrivateChat === name) switchTab('private');
                            else handlePrivateChatClick(name);
                        });
                    }
                });
            }
            function buildSidebarItem(userName, isOnline, isPending, isSelf=false, isAccepted=false) {
                const av = avatarCache[userName] ? `<img src="${escapeHtml(avatarCache[userName])}">` : (userName[0]||'?');
                let btnClass = 'private-btn', btnText = 'Request';
                if (isAccepted) { btnClass += ' accepted'; btnText = 'Chat'; }
                else if (isPending) { btnClass += ' pending'; btnText = 'Accept?'; }
                return `<div class="sidebar-user-item${isSelf?' you-tag':''}" data-username="${escapeHtml(userName)}">
                    <div class="user-avatar">${av}${isOnline?'<span class="online-indicator"></span>':''}</div>
                    <div class="user-info"><div class="user-name">${escapeHtml(userName)}</div><div class="user-status-text">${isSelf?'You':'Online'}</div></div>
                    ${!isSelf ? `<button class="${btnClass}">${btnText}</button>` : ''}
                </div>`;
            }

            function showRequestOverlay(fromUser, requestId) {
                currentRequestData = { from_user: fromUser, id: requestId };
                const url = avatarCache[fromUser];
                requestAvatar.innerHTML = url ? `<img src="${escapeHtml(url)}">` : (fromUser[0]?.toUpperCase() || '?');
                requestName.textContent = `${fromUser} wants to chat privately`;
                requestOverlay.classList.remove('hidden');
            }
            function hideRequestOverlay() {
                requestOverlay.classList.add('hidden');
                currentRequestData = null;
            }
            requestAcceptBtn.addEventListener('click', async () => {
                if (!currentRequestData) return;
                await acceptRequest(currentRequestData.from_user, currentRequestData.id);
                hideRequestOverlay();
            });
            requestDeclineBtn.addEventListener('click', () => {
                if (!currentRequestData) return;
                supabase.from('private_chat_requests').delete().eq('id', currentRequestData.id).then(() => {
                    pendingPrivateRequests.delete(currentRequestData.from_user);
                    updateSidebar();
                });
                hideRequestOverlay();
            });

            async function handlePrivateChatClick(targetUser) {
                if (acceptedPrivateChats.has(targetUser)) {
                    setActivePrivateChat(targetUser);
                    return;
                }
                if (pendingPrivateRequests.has(targetUser)) {
                    const req = pendingPrivateRequests.get(targetUser);
                    if (req.status === 'pending' && req.from_user === targetUser) {
                        showRequestOverlay(targetUser, req.id);
                        return;
                    }
                }
                await sendRequest(targetUser);
            }
            async function sendRequest(toUser) {
                const { error } = await supabase.from('private_chat_requests').insert({ from_user: username, to_user: toUser, status: 'pending' });
                if (error) return showError(error.message);
                showError('📩 Request sent to ' + toUser);
                updateSidebar();
            }
            async function acceptRequest(fromUser, id) {
                const { error } = await supabase.from('private_chat_requests').update({ status:'accepted' }).eq('id', id);
                if (error) return showError(error.message);
                pendingPrivateRequests.delete(fromUser);
                acceptedPrivateChats.add(fromUser);
                localStorage.setItem('nitro_accepted_chats', JSON.stringify([...acceptedPrivateChats]));
                setActivePrivateChat(fromUser);
                updateSidebar();
                showError('✅ Chat with ' + fromUser + ' active!');
            }

            async function loadAcceptedChatsFromDB() {
                try {
                    const { data: sent } = await supabase.from('private_chat_requests').select('to_user').eq('from_user', username).eq('status', 'accepted');
                    const { data: received } = await supabase.from('private_chat_requests').select('from_user').eq('to_user', username).eq('status', 'accepted');
                    (sent||[]).forEach(r => acceptedPrivateChats.add(r.to_user));
                    (received||[]).forEach(r => acceptedPrivateChats.add(r.from_user));
                    localStorage.setItem('nitro_accepted_chats', JSON.stringify([...acceptedPrivateChats]));
                } catch (err) {}
            }

            async function loadPublicMessages() {
                try {
                    const { data, error } = await supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(80);
                    if (error) throw error;
                    publicContainer.innerHTML = '';
                    knownMessageIds.clear();
                    if (data.length === 0) {
                        publicContainer.innerHTML = '<div class="empty-chat-hint">No messages yet. ⚡</div>';
                    } else {
                        const users = [...new Set(data.map(m => m.username))];
                        await fetchAvatars(users);
                        data.forEach(m => renderMessage(m, false));
                    }
                    setConnection('connected');
                } catch (err) {
                    showError('Failed to load messages: ' + err.message);
                    publicContainer.innerHTML = '<div class="empty-chat-hint">No messages yet. ⚡</div>';
                    setConnection('disconnected');
                }
            }

            async function sendMessage() {
                const text = messageInput.value.trim();
                if (!text && !pendingImageUrl) return;
                if (!username) return;
                sendBtn.disabled = true;
                const isPrivate = (currentTab === 'private' && activePrivateChat);
                if (isPrivate && !activePrivateChat) { showError('No partner'); sendBtn.disabled = false; return; }
                let table = isPrivate ? 'private_messages' : 'messages';
                let payload = { message: text || null, image_url: pendingImageUrl || null };
                if (replyingTo?.id) {
                    payload.reply_to_id = replyingTo.id;
                    payload.reply_to_username = replyingTo.username;
                    payload.reply_to_message = replyingTo.message;
                    if (replyingTo.imageUrl) payload.reply_to_image_url = replyingTo.imageUrl;
                }
                if (isPrivate) { payload.from_user = username; payload.to_user = activePrivateChat; }
                else { payload.username = username; }
                try {
                    const { error } = await supabase.from(table).insert([payload]);
                    if (error) throw error;
                    messageInput.value = '';
                    setReplyingTo(null);
                    clearAttachedImage();
                    stopTyping();
                } catch (err) { showError('Send failed: ' + err.message); }
                finally { sendBtn.disabled = false; messageInput.focus(); }
            }

            function subscribeRealtime() {
                if (realtimeChannel) supabase.removeChannel(realtimeChannel);
                realtimeChannel = supabase.channel('public-msgs')
                    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, p => renderMessage(p.new, false))
                    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'messages' }, handlePublicMessageUpdate)
                    .subscribe();
                if (privMsgChannel) supabase.removeChannel(privMsgChannel);
                privMsgChannel = supabase.channel('priv-msgs')
                    .on('postgres_changes', { event:'INSERT', schema:'public', table:'private_messages' }, p => {
                        const msg = p.new;
                        if (activePrivateChat && ((msg.from_user===username && msg.to_user===activePrivateChat) || (msg.from_user===activePrivateChat && msg.to_user===username)))
                            renderMessage(msg, true);
                    })
                    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'private_messages' }, handlePrivateMessageUpdate)
                    .subscribe();
                if (profilesChannel) supabase.removeChannel(profilesChannel);
                profilesChannel = supabase.channel('profiles-chan')
                    .on('postgres_changes', { event:'*', schema:'public', table:'profiles' }, payload => {
                        const record = payload.new || payload.old;
                        if (!record) return;
                        delete avatarCache[record.username];
                        const allUsers = new Set();
                        onlineUsers.forEach(u => allUsers.add(u.username));
                        if (activePrivateChat) allUsers.add(activePrivateChat);
                        allUsers.add(username);
                        fetchAvatars([...allUsers]).then(() => updateSidebar());
                    })
                    .subscribe();
            }

            function subscribePrivateRequests() {
                if (privateRequestsChannel) supabase.removeChannel(privateRequestsChannel);
                privateRequestsChannel = supabase.channel('priv-req').on('postgres_changes', { event:'*', schema:'public', table:'private_chat_requests' }, p => {
                    const r = p.new || p.old;
                    if (!r) return;
                    if (r.to_user === username && r.status === 'pending') {
                        pendingPrivateRequests.set(r.from_user, { status:'pending', id: r.id, from_user: r.from_user });
                        updateSidebar();
                        fetchAvatars([r.from_user]).then(() => showRequestOverlay(r.from_user, r.id));
                    }
                    if (r.status === 'accepted') {
                        const partner = r.from_user === username ? r.to_user : r.from_user;
                        acceptedPrivateChats.add(partner);
                        localStorage.setItem('nitro_accepted_chats', JSON.stringify([...acceptedPrivateChats]));
                        setActivePrivateChat(partner);
                        updateSidebar();
                    }
                }).subscribe();
            }
